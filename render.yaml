services:
  - type: web
    name: chatbotaI-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: VECTOR_DB_TYPE
        value: chroma
      - key: CHROMA_PERSIST_DIR
        value: /tmp/chroma_db
      - key: CORS_ORIGINS
        value: "*"
      - key: DEFAULT_MODEL
        value: gpt-3.5-turbo
      - key: DEFAULT_TEMPERATURE
        value: "0.7"